# Syslog collector
# Point devices to UDP/TCP 514 on this host
# (iptables NATs 514 → 5140/5141, see setup.sh)

input {
  syslog {
    host  => "0.0.0.0"
    port  => 5140
    type  => "syslog-udp"
  }
  tcp {
    host  => "0.0.0.0"
    port  => 5141
    codec => "plain"
    type  => "syslog-tcp"
  }
}

filter {
  mutate {
    add_field => { "data_type" => "syslog" }
  }

  # Normalize into ECS-like fields across major vendors.
  if [message] =~ /date=\d{4}-\d{2}-\d{2} time=\d{2}:\d{2}:\d{2} .*devid=/ {
    mutate {
      add_field => {
        "[observer][vendor]" => "Fortinet"
        "[observer][product]" => "FortiGate"
      }
    }
    kv {
      source => "message"
      field_split => " "
      value_split => "="
      trim_value => "\""
      include_keys => ["srcip","dstip","srcport","dstport","proto","action","level","subtype"]
    }
  } else if [message] =~ /,TRAFFIC,|,THREAT,/ {
    mutate {
      add_field => {
        "[observer][vendor]" => "Palo Alto Networks"
        "[observer][product]" => "PAN-OS"
      }
    }
    csv {
      source => "message"
      separator => ","
      columns => ["future_use","receive_time","serial_number","type","subtype","future_use_2","time_generated","srcip","dstip","natsrc","natdst","rule","srcuser","dstuser","app","vsys","from_zone","to_zone","inbound_if","outbound_if","logset","future_use_3","sessionid","repeatcnt","srcport","dstport","natsrcport","natdstport","flags","proto","action"]
    }
  } else if [message] =~ /%[A-Z0-9_\-]+-\d-[A-Z0-9_\-]+/ {
    mutate {
      add_field => {
        "[observer][vendor]" => "Cisco"
        "[observer][product]" => "IOS"
      }
    }
    grok {
      match => { "message" => ["^%{DATA:[event][code]}: %{GREEDYDATA:[event][original_message]}$"] }
      tag_on_failure => ["_cisco_parse_failure"]
    }
  } else if [message] =~ /^CEF:/ {
    mutate {
      add_field => {
        "[event][kind]" => "alert"
      }
    }
  }

  if [srcip] {
    mutate { add_field => { "[source][ip]" => "%{srcip}" } }
  }
  if [dstip] {
    mutate { add_field => { "[destination][ip]" => "%{dstip}" } }
  }
  if [srcport] {
    mutate { add_field => { "[source][port]" => "%{srcport}" } }
  }
  if [dstport] {
    mutate { add_field => { "[destination][port]" => "%{dstport}" } }
  }

  if [action] {
    mutate {
      copy => { "action" => "[event][original_action]" }
      lowercase => ["action"]
    }
    translate {
      field => "action"
      destination => "[event][action]"
      dictionary => {
        "accept" => "allow"
        "allowed" => "allow"
        "allow" => "allow"
        "permit" => "allow"
        "permitted" => "allow"
        "pass" => "allow"
        "deny" => "deny"
        "denied" => "deny"
        "drop" => "deny"
        "dropped" => "deny"
        "block" => "deny"
        "blocked" => "deny"
        "reset" => "reset"
        "reset-both" => "reset"
        "close" => "close"
        "closed" => "close"
      }
      fallback => "other"
    }
  }

  if [level] {
    mutate { lowercase => ["level"] }
    translate {
      field => "level"
      destination => "[event][severity]"
      dictionary => {
        "debug" => "2"
        "info" => "4"
        "notice" => "5"
        "warning" => "8"
        "warn" => "8"
        "error" => "12"
        "err" => "12"
        "critical" => "16"
        "alert" => "20"
        "emergency" => "24"
      }
    }
    mutate { convert => { "[event][severity]" => "integer" } }
  }

  mutate {
    convert => {
      "[source][port]" => "integer"
      "[destination][port]" => "integer"
    }
  }

  if [host] =~ /^\d+\.\d+\.\d+\.\d+$/ {
    geoip {
      source => "host"
      target => "[source][geo]"
    }
  }

  # Drop noise — customize for your environment
  if [message] =~ /last message repeated/ { drop {} }
  if [message] =~ /CRON\[/               { drop {} }

  # Redis enrichment for IP reputation / threat intel
  # Optional: populate Redis with IP reputation data beforehand
  # Example: redis-cli SET "ip:8.8.8.8" "google-dns" (replace with actual threat data)
  if [source][ip] {
    redis {
      host => "${REDIS_HOST:redis}"
      port => "${REDIS_PORT:6379}"
      password => "${REDIS_PASSWORD}"
      key => "ip:%{[source][ip]}"
      destination => "[source][reputation]"
      db => 0
    }
  }
  if [destination][ip] {
    redis {
      host => "${REDIS_HOST:redis}"
      port => "${REDIS_PORT:6379}"
      password => "${REDIS_PASSWORD}"
      key => "ip:%{[destination][ip]}"
      destination => "[destination][reputation]"
      db => 0
    }
  }
}

output {
  opensearch {
    hosts                        => ["https://${OPENSEARCH_HOST:127.0.0.1}:${OPENSEARCH_PORT:9200}"]
    user                         => "${OPENSEARCH_USERNAME}"
    password                     => "${OPENSEARCH_PASSWORD}"
    ssl                          => true
    ssl_certificate_verification => "${OPENSEARCH_SSL_VERIFY:false}"
    index                        => "syslog-%{+YYYY.MM.dd}"
    action                       => "index"
  }
}
