# NetFlow v5/v9 + IPFIX + sFlow collector
# Point your routers/switches/firewalls to:
#   NetFlow/IPFIX: UDP 2055 on this host
#   sFlow:         UDP 6343 on this host

input {
  udp {
    host    => "0.0.0.0"
    port    => 2055
    codec   => netflow {
      versions            => [5, 9, 10]  # 10 = IPFIX
      cache_save_path     => "/tmp/netflow_templates"
      include_flowset_id  => true
    }
    workers              => 4
    receive_buffer_bytes => 16777216
    type                 => "netflow"
  }
  udp {
    host    => "0.0.0.0"
    port    => 6343
    codec   => netflow {
      versions => [5, 9, 10]
    }
    workers  => 2
    type     => "sflow"
  }
}

filter {
  mutate {
    add_field => { "data_type" => "netflow" }
  }

  # Normalize fields across NetFlow versions
  if [netflow][src_addr]  { mutate { rename => { "[netflow][src_addr]"  => "[network][src_ip]"   } } }
  if [netflow][dst_addr]  { mutate { rename => { "[netflow][dst_addr]"  => "[network][dst_ip]"   } } }
  if [netflow][src_port]  { mutate { rename => { "[netflow][src_port]"  => "[network][src_port]" } } }
  if [netflow][dst_port]  { mutate { rename => { "[netflow][dst_port]"  => "[network][dst_port]" } } }
  if [netflow][protocol]  { mutate { rename => { "[netflow][protocol]"  => "[network][protocol]" } } }
  if [netflow][in_bytes]  { mutate { rename => { "[netflow][in_bytes]"  => "[network][bytes]"    } } }
  if [netflow][in_pkts]   { mutate { rename => { "[netflow][in_pkts]"   => "[network][packets]"  } } }

  # GeoIP enrichment
  if [network][src_ip] {
    geoip {
      source => "[network][src_ip]"
      target => "[source][geo]"
    }
  }
  if [network][dst_ip] {
    geoip {
      source => "[network][dst_ip]"
      target => "[destination][geo]"
    }
  }

  # Redis enrichment for IP reputation / threat intel
  if [network][src_ip] {
    redis {
      host => "${REDIS_HOST:redis}"
      port => "${REDIS_PORT:6379}"
      password => "${REDIS_PASSWORD}"
      key => "ip:%{[network][src_ip]}"
      destination => "[source][reputation]"
      db => 0
    }
  }
  if [network][dst_ip] {
    redis {
      host => "${REDIS_HOST:redis}"
      port => "${REDIS_PORT:6379}"
      password => "${REDIS_PASSWORD}"
      key => "ip:%{[network][dst_ip]}"
      destination => "[destination][reputation]"
      db => 0
    }
  }
}

output {
  opensearch {
    hosts                        => ["https://${OPENSEARCH_HOST:127.0.0.1}:${OPENSEARCH_PORT:9200}"]
    user                         => "${OPENSEARCH_USERNAME}"
    password                     => "${OPENSEARCH_PASSWORD}"
    ssl                          => true
    ssl_certificate_verification => "${OPENSEARCH_SSL_VERIFY:false}"
    index                        => "netflow-%{+YYYY.MM.dd}"
    action                       => "index"
  }
}
