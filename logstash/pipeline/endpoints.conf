# Endpoint collector
# Agents send to TCP 5044 (Winlogbeat/Filebeat/Auditbeat)

input {
  beats {
    host => "0.0.0.0"
    port => 5044
  }
}

filter {
  mutate {
    add_field => { "data_type" => "endpoint" }
  }

  if [agent][type] == "winlogbeat" or [winlog] {
    mutate {
      replace => { "data_type" => "endpoint_windows" }
      add_field => {
        "[observer][vendor]" => "Microsoft"
        "[observer][product]" => "Windows"
      }
    }

    if [winlog][event_id] and ![event][code] {
      mutate { add_field => { "[event][code]" => "%{[winlog][event_id]}" } }
    }

    if [event][provider] =~ /Sysmon/i {
      mutate { add_field => { "[event][dataset]" => "windows.sysmon" } }
    } else if [winlog][channel] == "Security" {
      mutate { add_field => { "[event][dataset]" => "windows.security" } }
    }
  }

  if [agent][type] == "filebeat" or [agent][type] == "auditbeat" or [host][os][type] == "linux" {
    mutate {
      replace => { "data_type" => "endpoint_linux" }
      add_field => {
        "[observer][vendor]" => "Linux"
        "[observer][product]" => "Linux Endpoint"
      }
    }

    if [log][file][path] =~ /auth.log|secure/ and [message] {
      grok {
        match => {
          "message" => [
            "%{SYSLOGTIMESTAMP:syslog_time} %{HOSTNAME:syslog_host} %{DATA:program}(?:\[%{NUMBER:pid}\])?: Accepted %{WORD:auth_method} for %{USERNAME:user_name} from %{IPORHOST:srcip} port %{NUMBER:srcport}",
            "%{SYSLOGTIMESTAMP:syslog_time} %{HOSTNAME:syslog_host} %{DATA:program}(?:\[%{NUMBER:pid}\])?: Failed password for(?: invalid user)? %{USERNAME:user_name} from %{IPORHOST:srcip} port %{NUMBER:srcport}",
            "%{SYSLOGTIMESTAMP:syslog_time} %{HOSTNAME:syslog_host} %{DATA:program}(?:\[%{NUMBER:pid}\])?: session opened for user %{USERNAME:user_name}",
            "%{SYSLOGTIMESTAMP:syslog_time} %{HOSTNAME:syslog_host} %{DATA:program}(?:\[%{NUMBER:pid}\])?: session closed for user %{USERNAME:user_name}"
          ]
        }
        tag_on_failure => ["_linux_auth_grok_failure"]
      }
    }

    if [srcip] {
      mutate { add_field => { "[source][ip]" => "%{srcip}" } }
    }
    if [srcport] {
      mutate { add_field => { "[source][port]" => "%{srcport}" } }
    }
  }

  if [event][action] {
    mutate {
      copy => { "[event][action]" => "[event][original_action]" }
      lowercase => ["[event][action]"]
    }
    translate {
      field => "[event][action]"
      destination => "[event][action]"
      dictionary => {
        "accept" => "allow"
        "allowed" => "allow"
        "allow" => "allow"
        "permit" => "allow"
        "permitted" => "allow"
        "pass" => "allow"
        "deny" => "deny"
        "denied" => "deny"
        "drop" => "deny"
        "dropped" => "deny"
        "block" => "deny"
        "blocked" => "deny"
        "reset" => "reset"
        "reset-both" => "reset"
        "close" => "close"
        "closed" => "close"
      }
      fallback => "other"
    }
  }

  if [log][level] and ![event][severity] {
    mutate { lowercase => ["[log][level]"] }
    translate {
      field => "[log][level]"
      destination => "[event][severity]"
      dictionary => {
        "debug" => "2"
        "info" => "4"
        "notice" => "5"
        "warning" => "8"
        "warn" => "8"
        "error" => "12"
        "err" => "12"
        "critical" => "16"
        "alert" => "20"
        "emergency" => "24"
      }
    }
    mutate { convert => { "[event][severity]" => "integer" } }
  }

  if [source][ip] {
    geoip {
      source => "[source][ip]"
      target => "[source][geo]"
    }

    redis {
      host => "${REDIS_HOST:redis}"
      port => "${REDIS_PORT:6379}"
      password => "${REDIS_PASSWORD}"
      key => "ip:%{[source][ip]}"
      destination => "[source][reputation]"
      db => 0
    }
  }
}

output {
  opensearch {
    hosts                        => ["https://${OPENSEARCH_HOST:127.0.0.1}:${OPENSEARCH_PORT:9200}"]
    user                         => "${OPENSEARCH_USERNAME}"
    password                     => "${OPENSEARCH_PASSWORD}"
    ssl                          => true
    ssl_certificate_verification => "${OPENSEARCH_SSL_VERIFY:false}"
    index                        => "endpoint-%{+YYYY.MM.dd}"
    action                       => "index"
  }
}
