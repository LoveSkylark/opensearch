# SNMP Trap receiver
# Point devices to UDP 162 on this host
# (iptables NATs 162 → 1062, see setup.sh)

input {
  snmptrap {
    host      => "0.0.0.0"
    port      => 1062
    community => "${SNMP_TRAP_COMMUNITY:public}"
    type      => "snmptrap"
    # SNMPv3 traps: uncomment and set MIB directory
    # yamlmibdir => '/etc/logstash/mibs'
  }
}

filter {
  mutate {
    add_field => { "data_type" => "snmp_trap" }
  }

  if [agent_addr] {
    mutate { add_field => { "[source][ip]" => "%{agent_addr}" } }
  }

  if [source][ip] {
    geoip {
      source => "[source][ip]"
      target => "[source][geo]"
    }
  }
}

output {
  opensearch {
    hosts                        => ["https://${OPENSEARCH_HOST:127.0.0.1}:${OPENSEARCH_PORT:9200}"]
    user                         => "${OPENSEARCH_USERNAME}"
    password                     => "${OPENSEARCH_PASSWORD}"
    ssl                          => true
    ssl_certificate_verification => "${OPENSEARCH_SSL_VERIFY:false}"
    index                        => "snmp-traps-%{+YYYY.MM.dd}"
    action                       => "index"
  }
}
