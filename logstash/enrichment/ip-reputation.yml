# IP Reputation Lookup — used by Logstash translate filter
#
# Format:  "<IP>": "<reputation-tag>"
#
# Reputation tags used by this stack:
#   known-good   : trusted internal or well-known external infrastructure
#   cdn          : content delivery network
#   dns-public   : public DNS resolvers
#   ntp          : public NTP servers
#   known-threat : IPs from threat intel feeds (update regularly)
#   tor-exit     : known Tor exit nodes
#   scanner      : known scanning infrastructure (Shodan, Censys, etc.)
#
# Logstash loads this file at startup and reloads on change
# (requires logstash.yml: config.reload.automatic: true).
#
# Add your own entries below. For large threat feeds, consider splitting
# into separate files and adding additional translate filter blocks.

# --- Internal / trusted infrastructure (replace with your own) ---
