# IP Category Lookup — used by Logstash translate filter
#
# Format:  "<IP>": "<category>"
#
# Complements ip-reputation.yml with higher-level asset grouping.
# Useful for grouping traffic by role in dashboards.
#
# Categories used by this stack:
#   firewall      : network perimeter devices
#   router        : layer-3 routing infrastructure
#   switch        : layer-2 switching infrastructure
#   server        : internal servers
#   monitoring    : monitoring/management infrastructure
#   printer       : printers and similar devices
#   iot           : IoT and OT devices
#   external      : external/internet-routable addresses with no specific category
#
# Replace the examples below with your real device IPs.

# --- Network infrastructure (replace with your own) ---
"192.168.1.1":   "firewall"
"192.168.1.254": "router"
"10.0.0.1":      "router"
"10.0.0.2":      "switch"

# --- Internal servers (replace with your own) ---
"10.0.1.10":     "server"
"10.0.1.11":     "server"

# --- Monitoring stack itself ---
"10.0.0.5":      "monitoring"
