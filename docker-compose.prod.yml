services:
  opensearch-dashboards:
    environment:
      OPENSEARCH_SSL_VERIFICATIONMODE: full

  logstash:
    environment:
      OPENSEARCH_SSL_VERIFY: true

  fluent-bit:
    volumes:
      - ./fluent-bit/fluent-bit.prod.conf:/fluent-bit/etc/fluent-bit.conf
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf

  opensearch-bootstrap:
    profiles:
      - bootstrap
