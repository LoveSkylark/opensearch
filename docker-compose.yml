# =============================================================
#  Network Monitoring Stack — OpenSearch Backend
#  All open source, no ElastiFlow, no LibreNMS
#
#  LibreNMS is a SEPARATE external module.
#  It connects to this stack only via the Prometheus Pushgateway
#  on port 9091. No other integration needed.
#
#  Components:
#    OpenSearch 2.14           Storage & search backend
#    OpenSearch Dashboards     Web UI (SAML-ready)
#    Logstash OSS              NetFlow/IPFIX/sFlow, syslog, SNMP traps
#    SNMP Exporter             Direct SNMP polling → Prometheus
#    Prometheus Pushgateway    Receives metrics from LibreNMS (external)
#    Prometheus                Metrics store — scrapes Pushgateway + SNMP Exporter
#
#  Collector → Storage map:
#    Logstash  (NetFlow, syslog, traps)  → OpenSearch
#    SNMP Exporter                       → Prometheus
#    LibreNMS (external, via Pushgateway)→ Prometheus
#
#  Visualization:
#    OpenSearch Dashboards  → OpenSearch  (logs, flows, traps)
#    OpenSearch Dashboards  → Prometheus  (SNMP metrics via datasource plugin)
#    Prometheus UI          → Prometheus  (raw metric exploration)
# =============================================================

services:

  # -----------------------------------------------------------
  # OPENSEARCH — Primary log/flow storage
  # REST API: https://your-host:9200
  # -----------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: opensearch
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 131072
        hard: 131072
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    environment:
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:-'-Xms4g -Xmx4g'}
      cluster.name: netmon-cluster
      node.name: os-node1
      bootstrap.memory_lock: 'true'
      discovery.type: single-node      # Remove for multi-node
      network.host: 0.0.0.0
      http.port: 9200
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f -u ${OPENSEARCH_ADMIN_USERNAME}:${OPENSEARCH_ADMIN_PASSWORD} https://127.0.0.1:9200/_cluster/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # -----------------------------------------------------------
  # OPENSEARCH DASHBOARDS — Unified web UI
  # Access: http://your-host:5601
  # Login: admin / Ch@ngeMe123!
  # Datasources: OpenSearch (logs/flows) + Prometheus (metrics)
  # -----------------------------------------------------------
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.14.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["https://127.0.0.1:9200"]'
      SERVER_HOST: '0.0.0.0'
      SERVER_PORT: '5601'
      OPENSEARCH_USERNAME: ${OPENSEARCH_ADMIN_USERNAME}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      OPENSEARCH_SSL_VERIFICATIONMODE: ${OPENSEARCH_DASHBOARDS_SSL_VERIFICATIONMODE:-none}
      # --- SAML (uncomment + fill in your IdP details to enable) ---
      #OPENSEARCH_SECURITY_AUTH_TYPE: 'saml'
      #SERVER_XSRF_ALLOWLIST: '[\"/_opendistro/_security/saml/acs\",\"/_opendistro/_security/saml/logout\"]'

  # -----------------------------------------------------------
  # LOGSTASH OSS — Flow & log collection
  # Handles: NetFlow v5/v9/IPFIX, sFlow, syslog, SNMP traps
  # MUST use network_mode: host to preserve source IPs for flows
  # Pipelines are in ./logstash/pipeline/
  # -----------------------------------------------------------
  logstash:
    build:
      context: ./logstash
      dockerfile: Dockerfile
    container_name: logstash
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
    environment:
      LS_JAVA_OPTS: ${LS_JAVA_OPTS:-'-Xms2g -Xmx2g'}
      OPENSEARCH_HOST: ${OPENSEARCH_HOST:-127.0.0.1}
      OPENSEARCH_PORT: ${OPENSEARCH_PORT:-9200}
      OPENSEARCH_USERNAME: ${OPENSEARCH_ADMIN_USERNAME}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      OPENSEARCH_SSL_VERIFY: ${OPENSEARCH_SSL_VERIFY:-false}
      SNMP_TRAP_COMMUNITY: ${SNMP_TRAP_COMMUNITY}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9600 >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 45s

  # -----------------------------------------------------------
  # SNMP EXPORTER — Active SNMP polling
  # Polls network devices, exposes metrics for Prometheus
  # Configure your devices in prometheus/prometheus.yml
  # Config (OID definitions) in snmp-exporter/snmp.yml
  # -----------------------------------------------------------
  snmp-exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: snmp-exporter
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9116:9116"
    volumes:
      - ./snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml
    command:
      - '--config.file=/etc/snmp_exporter/snmp.yml'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://127.0.0.1:9116/metrics || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  # -----------------------------------------------------------
  # PROMETHEUS PUSHGATEWAY
  # LibreNMS (external) pushes its SNMP poll metrics here.
  # Configure LibreNMS with:
  #   lnms config:set prometheus.enable true
  #   lnms config:set prometheus.url 'http://this-host:9091'
  #   lnms config:set prometheus.job 'librenms'
  #   lnms config:set prometheus.prefix 'librenms'
  # Access: http://your-host:9091
  # -----------------------------------------------------------
  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: pushgateway
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9091:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://127.0.0.1:9091/-/healthy || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s

  # -----------------------------------------------------------
  # PROMETHEUS — Metrics storage & query engine
  # Scrapes: SNMP Exporter (direct) + Pushgateway (LibreNMS)
  # Access: http://your-host:9090
  # OpenSearch Dashboards connects here as a datasource
  # -----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    depends_on:
      snmp-exporter:
        condition: service_healthy
      pushgateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s

  # -----------------------------------------------------------
  # GRAFANA (OPTIONAL) — Additional dashboard GUI
  # Access: http://your-host:3000
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ChangeMeGrafana!}
      GF_INSTALL_PLUGINS: grafana-opensearch-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  # -----------------------------------------------------------
  # REDIS — In-memory cache for enrichment
  # Port: 6379
  # Logstash uses this to enrich events with IP reputation, etc.
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisChangeMe!}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------
  # OPENSEARCH BOOTSTRAP — Applies retention policies/templates
  # Safe to rerun; requests are idempotent.
  # -----------------------------------------------------------
  opensearch-bootstrap:
    image: curlimages/curl:8.8.0
    container_name: opensearch-bootstrap
    restart: "no"
    network_mode: host
    env_file:
      - .env
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ./scripts/bootstrap-opensearch.sh:/bootstrap-opensearch.sh:ro
    command: ["sh", "/bootstrap-opensearch.sh"]

volumes:
  opensearch-data:
  prometheus-data:
  grafana-data:
