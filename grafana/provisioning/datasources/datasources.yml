apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: OpenSearch
    type: grafana-opensearch-datasource
    access: proxy
    url: https://opensearch:9200
    basicAuth: true
    basicAuthUser: ${OPENSEARCH_ADMIN_USERNAME}
    secureJsonData:
      basicAuthPassword: ${OPENSEARCH_ADMIN_PASSWORD}
    jsonData:
      tlsSkipVerify: true
      flavor: opensearch
      version: 2.14.0
    editable: true
