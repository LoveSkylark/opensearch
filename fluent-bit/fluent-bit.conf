[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name          syslog
    Listen        0.0.0.0
    Port          5140
    Protocol      udp
    Mode          udp
    Parser        syslog-rfc3164
    Tag           syslog.udp

[INPUT]
    Name          syslog
    Listen        0.0.0.0
    Port          5141
    Protocol      tcp
    Mode          tcp
    Parser        syslog-rfc5424
    Tag           syslog.tcp

[FILTER]
    Name          record_modifier
    Match         *
    Record        collector fluent-bit
    Record        data_type  syslog

[OUTPUT]
    Name              opensearch
    Match             *
    Host              ${OPENSEARCH_HOST}
    Port              ${OPENSEARCH_PORT}
    HTTP_User         ${OPENSEARCH_USERNAME}
    HTTP_Passwd       ${OPENSEARCH_PASSWORD}
    TLS               On
    TLS.Verify        Off
    Index             syslog-%Y.%m.%d
    Suppress_Type_Name On
    Retry_Limit       3
